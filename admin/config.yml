backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

locale: 'en'

collections:

  # ── COMPANY SETTINGS ──
  - name: "settings"
    label: "⚙️ Company Settings"
    files:
      - label: "Company Info"
        name: "company"
        file: "content/settings/company.json"
        fields:
          - { label: "Company Name", name: "name", widget: "string", default: "Mannat Furniture" }
          - { label: "Tagline", name: "tagline", widget: "string", default: "Furniture Built to Last a Lifetime" }
          - { label: "Phone / WhatsApp", name: "phone", widget: "string", default: "+977-XXX-XXXXXXX" }
          - { label: "Email Address", name: "email", widget: "string", default: "info@mannatfurniture.com.np" }
          - { label: "Address Line 1", name: "address1", widget: "string", default: "Damak-5, Jhapa" }
          - { label: "Address Line 2", name: "address2", widget: "string", default: "Koshi Province, Nepal" }
          - { label: "Facebook Page URL", name: "facebook", widget: "string", required: false }
          - { label: "Instagram URL", name: "instagram", widget: "string", required: false }
          - { label: "WhatsApp Number (with country code)", name: "whatsapp", widget: "string", default: "977XXXXXXXXXX" }
          - label: "Showroom Hours"
            name: "hours"
            widget: "object"
            fields:
              - { label: "Weekdays (Sun–Fri)", name: "weekdays", widget: "string", default: "9:00 AM – 6:00 PM" }
              - { label: "Saturday", name: "saturday", widget: "string", default: "10:00 AM – 4:00 PM" }

  # ── PRODUCTS ──
  - name: "products"
    label: "🪑 Products"
    label_singular: "Product"
    folder: "content/products"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Product Name", name: "title", widget: "string" }
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - { label: "Living Room", value: "living-room" }
          - { label: "Bedroom", value: "bedroom" }
          - { label: "Dining & Kitchen", value: "dining" }
          - { label: "Hotel & Resort", value: "hotel" }
          - { label: "Restaurant & Café", value: "restaurant" }
          - { label: "Office & Study", value: "office" }
          - { label: "Outdoor", value: "outdoor" }
          - { label: "Custom", value: "custom" }
      - { label: "Product Photo", name: "image", widget: "image", required: false }
      - { label: "Price (NPR)", name: "price", widget: "string", default: "NPR 00,000" }
      - { label: "Price Note", name: "price_note", widget: "string", default: "onwards", required: false }
      - { label: "Material / Description", name: "material", widget: "string" }
      - { label: "Full Description", name: "description", widget: "text", required: false }
      - label: "Badge"
        name: "badge"
        widget: "select"
        required: false
        options:
          - { label: "New", value: "New" }
          - { label: "Bestseller", value: "Bestseller" }
          - { label: "Hotel Grade", value: "Hotel Grade" }
          - { label: "Sale", value: "Sale" }
          - { label: "None", value: "" }
      - { label: "Featured on Homepage?", name: "featured", widget: "boolean", default: true }
      - { label: "Available / In Stock?", name: "available", widget: "boolean", default: true }

  # ── PROJECTS / PORTFOLIO ──
  - name: "projects"
    label: "🏨 Projects Portfolio"
    label_singular: "Project"
    folder: "content/projects"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Project Name", name: "title", widget: "string" }
      - { label: "Location", name: "location", widget: "string", hint: "e.g. Biratnagar" }
      - { label: "Project Description", name: "description", widget: "string", hint: "e.g. 80-room complete hotel fit-out" }
      - label: "Project Type"
        name: "type"
        widget: "select"
        options:
          - { label: "Hotel", value: "hotel" }
          - { label: "Resort", value: "resort" }
          - { label: "Home / Residence", value: "home" }
          - { label: "Restaurant / Café", value: "restaurant" }
          - { label: "Office", value: "office" }
      - { label: "Project Photo", name: "image", widget: "image", required: false }
      - { label: "Show on Website?", name: "published", widget: "boolean", default: true }

  # ── TESTIMONIALS ──
  - name: "testimonials"
    label: "⭐ Customer Reviews"
    label_singular: "Review"
    folder: "content/testimonials"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Customer Name", name: "name", widget: "string" }
      - { label: "Location / Business", name: "location", widget: "string", hint: "e.g. Hotel Manager, Biratnagar" }
      - { label: "Review Text", name: "text", widget: "text" }
      - label: "Star Rating"
        name: "rating"
        widget: "select"
        options: ["5", "4", "3"]
        default: "5"
      - { label: "Show on Website?", name: "published", widget: "boolean", default: true }

  # ── HERO / HOMEPAGE BANNER ──
  - name: "homepage"
    label: "🏠 Homepage Content"
    files:
      - label: "Hero Banner"
        name: "hero"
        file: "content/homepage/hero.json"
        fields:
          - { label: "Main Heading Line 1", name: "heading1", widget: "string", default: "Furniture Built to" }
          - { label: "Main Heading Line 2 (highlighted)", name: "heading2", widget: "string", default: "Last a Lifetime" }
          - { label: "Sub-description", name: "description", widget: "text", default: "From intimate homes to grand hotels — every piece we craft carries the warmth of Nepali craftsmanship." }
          - { label: "Button 1 Text", name: "btn1_text", widget: "string", default: "Explore Collections" }
          - { label: "Button 2 Text", name: "btn2_text", widget: "string", default: "Book a Consultation" }
          - { label: "Announcement Bar Text", name: "announcement", widget: "string", default: "🎉 Now delivering all across Nepal — Free delivery on orders above NPR 50,000!", required: false }
